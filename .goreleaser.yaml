version: 2

project_name: termp

builds:
  - id: termp
    main: ./cmd/termp
    binary: termp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: termp
    ids:
      - termp
    formats:
      - tar.gz
    name_template: "termp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

nfpms:
  - id: termp
    ids:
      - termp
    package_name: termp
    vendor: polter-dev
    homepage: https://github.com/polter-dev/discord_terminal_presence
    maintainer: polter-dev
    description: Discord Rich Presence daemon for terminal tools.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

homebrew_casks:
  - name: termp
    binaries:
      - termp
    repository:
      owner: polter-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/polter-dev/discord_terminal_presence
    description: Discord Rich Presence daemon for terminal tools.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/termp"]
          end

release:
  # The polter-dev/homebrew-tap repository must exist before running goreleaser release.
  draft: true
